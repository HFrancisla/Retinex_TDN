# RetinexPointRaw — LOLv2 pure_low_single 基线 (损失全部使用代码默认值)
experiment:
  name: "LOLv2_1.0r_0.05anchorv2_0.05bdsp"
  auto_name: true

data:
  path: "datasets/LOLv2"
  mode: "pure_low_single"
  crop_size: 384
  batch_size: 8
  val_batch_size: 4
  num_workers: 4

model:
  name: "RetinexPointRaw"
  use_dp: false
  gpu_id: "0"

training:
  seed: 42
  max_iterations: 10000
  lr: 0.0001
  warmup_iterations: 1000
  log_interval: 200
  save_ckpt_interval: 500
  eval:
    eval_interval: 500
    save_img_interval: 0
    save_best_ckpt: true
    save_best_images: true
    selection_metric: "r_low_highref_psnr"
    selection_mode: "max"
    keep_top_ckpt: 3
    max_save_images: 100
    final_full_validation: false

loss:
  mode: "pure_low_single_point"
  recon_weight: 1.0
  anchor_weight: 0.05
  anchor_version: "v2"
  bdsp_weight: 0.05

resume:
  checkpoint: ""
  weights: ""

device: "cuda"
