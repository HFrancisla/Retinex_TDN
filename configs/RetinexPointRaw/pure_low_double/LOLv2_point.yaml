experiment:
  name: "pure_low_double_lolv2_point"
  auto_name: true

data:
  path: "datasets/LOLv2"
  mode: "pure_low_double"
  crop_size: 384
  batch_size: 4
  num_workers: 4

  # 光度增强：让 view1/view2 经历不同的亮度扰动
  photometric_augment:
    enabled: true
    gamma_range: [0.7, 1.5]        # gamma 校正范围，<1 变亮，>1 变暗
    brightness_range: [0.6, 1.4]    # 亮度缩放范围

model:
  name: "RetinexPointRaw"
  use_dp: false
  gpu_id: "0"

training:
  max_iterations: 10000
  lr: 0.0001
  warmup_iterations: 1000       # 线性 warmup 步数
  log_interval: 1000        # 每 N 步打印训练日志
  save_ckpt_interval: 0
  eval:
    eval_interval: 2000
    save_img_interval: 10000  # 每 N 步保存可视化图片（必须是 eval.eval_interval 的整数倍）
    save_best_ckpt: true

loss:
  # pure_low_double_point 模式: recon_weight, anchor_weight, bdsp_weight, self_recon_weight, reflect_weight
  mode: "pure_low_double_point"
  recon_weight: 1
  anchor_weight: 0.05
  bdsp_weight: 0.05
  self_recon_weight: 0.05
  reflect_weight: 0.05

resume:
  checkpoint: ""
  weights: ""

device: "cuda"
