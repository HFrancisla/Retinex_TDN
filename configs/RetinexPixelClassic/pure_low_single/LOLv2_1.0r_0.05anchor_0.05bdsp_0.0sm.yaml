# RetinexPixelClassic — LOLv2 pure_low_single 基线 (损失全部使用代码默认值)
experiment:
  name: "LOLv2_1.0r_0.05anchor_0.05bdsp_0.0sm"
  auto_name: true

data:
  path: "datasets/LOLv2"
  mode: "pure_low_single"
  crop_size: 384
  batch_size: 8
  num_workers: 4

model:
  name: "RetinexPixelClassic"
  dim: 24
  l_channel: 32
  use_dp: false
  gpu_id: "0"

training:
  seed: 42
  max_iterations: 10000
  lr: 0.0001
  warmup_iterations: 1000
  log_interval: 1000
  save_ckpt_interval: 0
  eval:
    eval_interval: 2000
    save_img_interval: 10000
    save_best_ckpt: true

loss:
  mode: "pure_low_single_pixel"
  recon_weight: 1.0
  anchor_weight: 0.05
  bdsp_weight: 0.05
  smooth_weight: 0.0

resume:
  checkpoint: ""
  weights: ""

device: "cuda"
