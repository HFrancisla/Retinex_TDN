# LOL 数据集实验 - paired 配置
# 损失权重: recon_high=1, recon_low=0.3, cross_recon=0.001, smooth=0, equal_r=0

experiment:
  name: "lol_baseline"
  auto_name: true
  tag: ""

data:
  mode: "paired"
  path: "datasets/LOLv2"
  crop_size: 384
  batch_size: 2
  num_workers: 0

model:
  name: "DecomNet"
  use_dp: false
  gpu_id: "0"

training:
  max_iterations: 100000
  lr: 0.0001
  warmup_iterations: 1000       # 线性 warmup 步数
  eval_interval: 2000      # 每 N 步评估一次
  save_interval: 10000     # 每 N 步保存 checkpoint
  save_img_interval: 10000  # 每 N 步保存可视化图片
  save_best: true

loss:
  # paired 模式: 仅支持 recon_weight_high/low, cross_recon_weight_high/low, smooth_weight, equal_r_weight
  recon_weight_high: 1.0
  recon_weight_low: 0.3
  cross_recon_weight_low: 0.001
  cross_recon_weight_high: 0.001
  equal_r_weight: 0
  smooth_weight: 0

resume:
  checkpoint: ""
  weights: ""

device: "cuda"
