# LOL 数据集实验 - 基础配置
# 损失权重: recon=20, anchor=1, bdsp=1, smooth=0, self_recon=1

experiment:
  name: "lol_baseline"
  auto_name: true
  tag: ""

data:
  mode: "paired"
  path: "datasets/LOLv2"
  crop_size: 384
  batch_size: 2
  num_workers: 0

model:
  name: "DecomNet"
  use_dp: false
  gpu_id: "0"

training:
  epochs: 300
  lr: 0.0001
  warmup: true
  save_interval: 20
  save_best: true

loss:
  # 统一损失字段，缺失项补 0，便于横向比较
  recon_weight_high: 0
  recon_weight_low: 0
  cross_recon_weight_low: 0
  cross_recon_weight_high: 0
  equal_r_weight: 0
  recon_weight: 1
  anchor_weight: 0.05
  bdsp_weight: 0.05
  smooth_weight: 0
  self_recon_weight: 0.05
  reflect_weight: 0
resume:
  checkpoint: ""
  weights: ""

device: "cuda"
