# RetinexPixelTransMinus — BDD100k pure_low_single 基线 (损失全部使用代码默认值)
experiment:
  name: "BDD_1.0r_0.05anchorv2_0.05bdsp_0.0smv1"
  auto_name: true

data:
  path: "/home/ipr4090/2024_hzf/Datasets/BDDnight"
  mode: "pure_low_single"
  crop_size: 512
  batch_size: 4
  val_batch_size: 4
  num_workers: 4

model:
  name: "RetinexPixelTransMinus"
  dim: 24
  l_heads: 1
  l_ffn_expansion: 2.66
  use_dp: false
  gpu_id: "0"

training:
  seed: 42
  max_iterations: 10000
  lr: 0.0001
  warmup_iterations: 1000
  log_interval: 200
  save_ckpt_interval: 500
  eval:
    eval_interval: 500
    save_img_interval: 0
    save_best_ckpt: true
    save_best_images: true
    selection_metric: "total_loss"
    selection_mode: "min"
    keep_top_ckpt: 3
    max_save_images: 100
    quick_val_size: 1000
    quick_val_crop_size: 512
    final_full_validation: true
    final_val_batch_size: 2

loss:
  mode: "pure_low_single_pixel"
  recon_weight: 1.0
  anchor_weight: 0.05
  anchor_version: "v2"
  bdsp_weight: 0.05
  smooth_weight: 0.0
  smooth_version: "v1"

resume:
  checkpoint: ""
  weights: ""

device: "cuda"
