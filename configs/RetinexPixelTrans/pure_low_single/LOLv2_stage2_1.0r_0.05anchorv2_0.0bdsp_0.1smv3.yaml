# Stage 2 E3: ablate BDSP on top of E2 to test whether edge matching copies low-light noise into R.
experiment:
  name: "LOLv2_stage2_1.0r_0.05anchorv2_0.0bdsp_0.1smv3"
  auto_name: true

data:
  path: "datasets/LOLv2"
  mode: "pure_low_single"
  crop_size: 384
  batch_size: 8
  val_batch_size: 4
  num_workers: 4

model:
  name: "RetinexPixelTrans"
  dim: 24
  l_heads: 1
  l_ffn_expansion: 2.66
  use_dp: false
  gpu_id: "0"

training:
  seed: 42
  max_iterations: 10000
  lr: 0.0001
  warmup_iterations: 1000
  log_interval: 200
  save_ckpt_interval: 2000
  eval:
    eval_interval: 500
    save_img_interval: 2000
    save_best_ckpt: true
    selection_metric: "recon_loss"
    selection_mode: "min"
    keep_top_ckpt: 0
    max_save_images: 100

loss:
  mode: "pure_low_single_pixel"
  recon_weight: 1.0
  anchor_weight: 0.05
  anchor_version: "v2"
  bdsp_weight: 0.0
  smooth_weight: 0.1
  smooth_version: "v3"

resume:
  checkpoint: ""
  weights: ""

device: "cuda"
