# Stage 2 E5 — E4 with detached, locally averaged smooth v3.
experiment:
  name: "LOLv2_stage2_0.01cross_0.2eq_0.1smv3"
  auto_name: true

data:
  path: "datasets/LOLv2"
  mode: "paired"
  crop_size: 384
  batch_size: 4
  val_batch_size: 4
  num_workers: 4

model:
  name: "RetinexPixelTrans"
  dim: 24
  l_heads: 1
  l_ffn_expansion: 2.66
  use_dp: false
  gpu_id: "0"

training:
  seed: 42
  max_iterations: 10000
  lr: 0.0001
  warmup_iterations: 1000
  log_interval: 200
  save_ckpt_interval: 500
  eval:
    eval_interval: 500
    save_img_interval: 1000
    save_best_ckpt: true
    selection_metric: "total_loss"
    selection_mode: "min"
    keep_top_ckpt: 0
    max_save_images: 100

loss:
  mode: "paired_pixel"
  recon_weight_high: 1.0
  recon_weight_low: 0.3
  cross_recon_weight_low: 0.01
  cross_recon_weight_high: 0.01
  smooth_weight: 0.1
  smooth_version: "v3"
  equal_r_weight: 0.2

resume:
  checkpoint: ""
  weights: ""

device: "cuda"
