# Stage 3 E4 — increase smooth only after consistency has been strengthened.
experiment:
  name: "LOLv2_stage3_0.05cross_0.2eq_0.2smv3"
  auto_name: true

data:
  path: "datasets/LOLv2"
  mode: "paired"
  crop_size: 384
  batch_size: 4
  val_batch_size: 4
  num_workers: 4

model:
  name: "RetinexPixelTrans"
  dim: 24
  l_heads: 1
  l_ffn_expansion: 2.66
  use_dp: false
  gpu_id: "0"

training:
  seed: 42
  max_iterations: 10000
  lr: 0.0001
  warmup_iterations: 1000
  log_interval: 200
  save_ckpt_interval: 500
  eval:
    eval_interval: 500
    save_img_interval: 0
    save_best_ckpt: true
    save_best_images: true
    selection_metric: "r_low_highref_psnr"
    selection_mode: "max"
    keep_top_ckpt: 3
    max_save_images: 100
    final_full_validation: false

loss:
  mode: "paired_pixel"
  recon_weight_high: 1.0
  recon_weight_low: 0.3
  cross_recon_weight_low: 0.05
  cross_recon_weight_high: 0.05
  smooth_weight: 0.2
  smooth_version: "v3"
  equal_r_weight: 0.2

resume:
  checkpoint: ""
  weights: ""

device: "cuda"
