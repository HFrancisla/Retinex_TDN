experiment:
  name: "paired_lolv2_pixel_trans"
  auto_name: true

data:
  path: "datasets/LOLv2"
  mode: "paired"
  crop_size: 384
  batch_size: 4
  num_workers: 4

model:
  name: "RetinexPixelTrans"
  dim: 24
  l_heads: 1
  l_ffn_expansion: 2.66
  use_dp: false
  gpu_id: "0"

training:
  max_iterations: 10000
  lr: 0.0001
  warmup_iterations: 1000       # 线性 warmup 步数
  log_interval: 1000        # 每 N 步打印训练日志
  save_ckpt_interval: 0
  eval:
    eval_interval: 500
    save_img_interval: 5000  # 每 N 步保存可视化图片（必须是 eval.eval_interval 的整数倍）
    save_best_ckpt: true

loss:
  # paired_pixel: 自重建 + 交叉重建 + R 一致性 + Retinex smooth
  mode: "paired_pixel"
  recon_weight_high: 1
  recon_weight_low: 0.3
  cross_recon_weight_low: 0.001
  cross_recon_weight_high: 0.001
  smooth_weight: 0.1
  equal_r_weight: 0.1

resume:
  checkpoint: ""
  weights: ""

device: "cuda"
