data:
  path: "datasets/LOLv2"
  mode: "paired"            # 训练模式: "paired" / "unpaired" / "pure_low_single" / "pure_low_double"
  crop_size: 256
  batch_size: 2
  num_workers: 0

model:
  name: "DecomNet"
  use_dp: false
  gpu_id: "0"

training:
  epochs: 300
  lr: 0.0001
  warmup: true
  save_interval: 20
  save_best: true

loss:
  # 统一损失字段，缺失项补 0，便于横向比较
  mode: "paired"
  recon_weight_high: 1.0
  recon_weight_low: 0.3
  cross_recon_weight_low: 0.001
  cross_recon_weight_high: 0.001
  equal_r_weight: 0
  recon_weight: 1
  anchor_weight: 0.05          # 光照锚定损失权重 (Illumination Anchoring)
  bdsp_weight: 0.05          # BDSP 结构保持损失权重 (Structure Preservation)
  smooth_weight: 0            # 光照平滑损失权重 (Illumination Smoothness)
  self_recon_weight: 0.05    # 自重构约束权重 (Self-Reconstruction)
  reflect_weight: 0
resume:
  checkpoint: ""
  weights: ""

device: "cuda"
