# ============================================================
# RetinexLR 实验配置模板
# ============================================================
# 使用方法：
#   python train.py --config configs/base.yaml
#   python train.py --config configs/lol_exp1.yaml
#
# 命名规则：
#   实验目录名 = {experiment_name}_{timestamp}
#   或者使用 auto_name: true 自动生成基于关键参数的名称
# ============================================================

# ---- 实验标识 ----
experiment:
  name: "decom_lol"           # 实验名称（手动指定）
  auto_name: false            # 是否自动生成名称（覆盖 name）
  tag: ""                     # 可选标签，如 "v2", "ablation"

# ---- 数据配置 ----
data:
  mode: "paired"            # 训练模式: "paired"（配对）或 "unpaired"（非配对）
  path: "datasets/LOLv2/Real_captured"
  crop_size: 256
  batch_size: 2
  num_workers: 0

# ---- 模型配置 ----
model:
  name: "DecomNet"
  use_dp: false
  gpu_id: "0"

# ---- 训练配置 ----
training:
  epochs: 300
  lr: 0.0001
  warmup: true
  save_interval: null         # null=不定期保存, int=每N个epoch保存一次
  save_best: true             # 自动保存验证集最优指标的权重

# ---- 损失权重 ----
# 对应 decomposition_loss.py 中的权重
loss:
  # 不写 mode 时，会自动跟随 data.mode：paired -> PairedLoss，unpaired -> UnpairedLoss
  # mode: "paired"

  # ---- paired 模式参数（参考 Diff-TDN 风格） ----
  # recon_weight_high: 1.0
  # recon_weight_low: 0.3
  # cross_recon_weight_low: 0.001
  # cross_recon_weight_high: 0.001
  # smooth_weight: 0.1
  # equal_r_weight: 0.1

  # ---- unpaired 模式参数（当前配置） ----
  recon_weight: 1            # 重建损失权重 (Reconstruction Loss)
  anchor_weight: 0.05        # 光照锚定损失权重 (Illumination Anchoring)
  bdsp_weight: 0.05          # BDSP 结构保持损失权重 (Structure Preservation)
  smooth_weight: 0            # 光照平滑损失权重 (Illumination Smoothness)
  self_recon_weight: 0.05    # 自重构约束权重 (Self-Reconstruction)

# ---- 恢复训练 ----
resume:
  checkpoint: ""              # 恢复的 checkpoint 路径
  weights: ""                 # 预训练权重路径

# ---- 设备 ----
device: "cuda"
