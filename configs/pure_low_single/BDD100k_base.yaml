experiment:
  name: "pure_low_single_night_100k"
  auto_name: true
  tag: "night_100k_below_40"

data:
  path: "datasets/BDD_below40"
  mode: "pure_low_single"
  crop_size: 512
  batch_size: 4
  num_workers: 4

model:
  name: "RetinexPointRaw"
  use_dp: false
  gpu_id: "0"

training:
  max_iterations: 100000
  lr: 0.0001
  warmup_iterations: 1000
  log_interval: 1000        # 每 N 步打印训练日志
  save_ckpt_interval: 10000
  eval:
    eval_interval: 2000
    save_img_interval: 10000  # 每 N 步保存可视化图片（必须是 eval.eval_interval 的整数倍）
    save_best_ckpt: true

loss:
  recon_weight: 1
  anchor_weight: 0.05
  bdsp_weight: 0.05

resume:
  checkpoint: ""
  weights: ""

device: "cuda"
