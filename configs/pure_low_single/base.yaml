experiment:
  name: "pure_low_single"
  auto_name: true

data:
  path: "datasets/LOLv2"
  mode: "pure_low_single"
  crop_size: 512
  batch_size: 4
  num_workers: 0

model:
  name: "DecomNet"
  use_dp: false
  gpu_id: "0"

training:
  max_iterations: 100000
  lr: 0.0001
  warmup_iterations: 1000       # 线性 warmup 步数
  eval_interval: 2000      # 每 N 步评估一次
  save_interval: 10000     # 每 N 步保存 checkpoint
  save_img_interval: 10000  # 每 N 步保存可视化图片
  save_best: true

loss:
  # pure_low_single 模式: 仅支持 recon_weight, anchor_weight, bdsp_weight
  recon_weight: 1
  anchor_weight: 0.05
  bdsp_weight: 0.05

resume:
  checkpoint: ""
  weights: ""

device: "cuda"
