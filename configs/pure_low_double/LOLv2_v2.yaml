experiment:
  name: "pure_low_double_v2"
  auto_name: true

data:
  path: "datasets/LOLv2"
  mode: "pure_low_double"
  crop_size: 384
  batch_size: 4
  num_workers: 0

model:
  name: "RetinexPointRaw"
  use_dp: false
  gpu_id: "0"

training:
  max_iterations: 100000
  lr: 0.0001
  warmup_iterations: 1000       # 线性 warmup 步数
  log_interval: 1000        # 每 N 步打印训练日志
  save_ckpt_interval: 10000     # 每 N 步保存 checkpoint
  eval:
    eval_interval: 2000
    save_img_interval: 10000  # 每 N 步保存可视化图片（必须是 eval.eval_interval 的整数倍）
    save_best_ckpt: true

loss:
  # pure_low_double 模式: 仅支持 recon_weight, anchor_weight, bdsp_weight, self_recon_weight, reflect_weight
  recon_weight: 1
  anchor_weight: 0.05
  bdsp_weight: 0.05
  self_recon_weight: 0.05
  reflect_weight: 0.05

resume:
  checkpoint: ""
  weights: ""

device: "cuda"
