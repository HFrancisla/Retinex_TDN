experiment:
  name: ""
  auto_name: true

data:
  path: "datasets/LOLv2"
  mode: "paired"            # 训练模式: "paired" / "unpaired" / "pure_low_single" / "pure_low_double"
  crop_size: 384
  batch_size: 4
  num_workers: 0

model:
  name: "RetinexPointRaw"
  use_dp: false
  gpu_id: "0"

training:
  max_iterations: 100000
  lr: 0.0001
  warmup_iterations: 1000       # 线性 warmup 步数
  log_interval: 1000        # 每 N 步打印训练日志
  save_ckpt_interval: 10000     # 每 N 步保存 checkpoint
  eval:
    eval_interval: 2000
    save_img_interval: 10000  # 每 N 步保存可视化图片（必须是 eval.eval_interval 的整数倍）
    save_best_ckpt: true

loss:
  # paired 模式字段: recon_weight_high, recon_weight_low,
  #   cross_recon_weight_low, cross_recon_weight_high, smooth_weight, equal_r_weight
  recon_weight_high: 1.0
  recon_weight_low: 0.3
  cross_recon_weight_low: 0.001
  cross_recon_weight_high: 0.001
  equal_r_weight: 0
  smooth_weight: 0

resume:
  checkpoint: ""
  weights: ""

device: "cuda"
