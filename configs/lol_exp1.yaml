# LOL 数据集实验 - 基础配置
# 损失权重: recon=20, cross_recon=1, bdsp=1, smooth=0, self_recon=1

experiment:
  name: "lol_baseline"
  auto_name: true
  tag: ""

data:
  path: "datasets/LOLv2"
  crop_size: 256
  batch_size: 2
  num_workers: 0

model:
  name: "DecomNet"
  use_dp: false
  gpu_id: "0"

training:
  epochs: 300
  lr: 0.0001
  warmup: true
  save_interval: 20
  save_best: true

loss:
  recon_weight: 20
  cross_recon_weight: 1
  bdsp_weight: 1
  smooth_weight: 0
  self_recon_weight: 1

resume:
  checkpoint: ""
  weights: ""

device: "cuda"
