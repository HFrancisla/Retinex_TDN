# RTX 5060 本机 CUDA 测试环境快照。
# uv 只识别标准文件名；恢复方法见 README_5060.md。
[project]
name = "retinex-tdn"
version = "0.1.0"
description = "Retinex decomposition network with a wavelet Transformer backbone"
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
    "einops>=0.6.0",
    "lpips>=0.1.4",
    "matplotlib>=3.5.0",
    "numpy>=1.22.0",
    "opencv-python>=4.6.0",
    "pillow>=9.0.0",
    "pywavelets>=1.4.0",
    "pyyaml>=6.0",
    "scikit-image>=0.19.0",
    "tensorboard>=2.10.0",
    "thop>=0.1.1",
    "torch==2.12.0",
    "torchvision==0.27.0",
    "tqdm>=4.64.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
]

[tool.uv.sources]
torch = { index = "pytorch-cu130" }
torchvision = { index = "pytorch-cu130" }

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true
